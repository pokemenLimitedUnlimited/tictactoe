<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="playerTurn">
      <h1><i class="X">X</i> Turn</h1>
    </section>
    <section id="Winner">
      <h1><i>X</i> Wins</h1>
    </section>
    <div id="gridDiv">
      <section id="grid">
        <button tabindex="-1" id="slot1" class="row1 col1"></button>
        <button tabindex="-1" id="slot2" class="row1 col2"></button>
        <button tabindex="-1" id="slot3" class="row1 col3"></button>
        <button tabindex="-1" id="slot4" class="row2 col1"></button>
        <button tabindex="-1" id="slot5" class="row2 col2"></button>
        <button tabindex="-1" id="slot6" class="row2 col3"></button>
        <button tabindex="-1" id="slot7" class="row3 col1"></button>
        <button tabindex="-1" id="slot8" class="row3 col2"></button>
        <button tabindex="-1" id="slot9" class="row3 col3"></button>
      </section>
    </div>
    <button tabindex="-1" id="resetBtn">Reset</button>
    <script src="app.js"></script>
  </body>
</html>
